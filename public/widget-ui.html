<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & Tokens ─────────────────────────────────────────────── */
    :root {
      --p: #2563eb;
      --pd: #1d4ed8;
      --bg: #f0f4f8;
      --sur: #ffffff;
      --bdr: #e2e8f0;
      --txt: #0f172a;
      --mut: #64748b;
      --r: 16px;
      --fn: 'Inter', -apple-system, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      font-family: var(--fn);
      color: var(--txt)
    }

    body {
      display: flex;
      flex-direction: column;
      background: var(--sur)
    }

    /* ─── Header ─────────────────────────────────────────────────────── */
    #hd {
      background: linear-gradient(135deg, var(--p), var(--pd));
      padding: 13px 16px;
      display: flex;
      align-items: center;
      gap: 11px;
      flex-shrink: 0;
      box-shadow: 0 1px 0 rgba(0, 0, 0, .08);
    }

    #hd-av {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .22);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }

    #hd-info {
      flex: 1;
      min-width: 0
    }

    #hd-name {
      font-size: 14.5px;
      font-weight: 600;
      color: #fff;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      letter-spacing: -.01em
    }

    #hd-status {
      font-size: 11px;
      color: rgba(255, 255, 255, .78);
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 2px
    }

    #hd-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 0 2px rgba(74, 222, 128, .3);
      display: inline-block
    }

    #btn-close {
      background: rgba(255, 255, 255, .18);
      border: none;
      border-radius: 9px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
      flex-shrink: 0;
    }

    #btn-close:hover {
      background: rgba(255, 255, 255, .3)
    }

    /* ─── Messages ────────────────────────────────────────────────────── */
    #msgs {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      background: var(--bg);
      scroll-behavior: smooth;
    }

    #msgs::-webkit-scrollbar {
      width: 3px
    }

    #msgs::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 3px
    }

    #greeting {
      background: linear-gradient(135deg, var(--p), var(--pd));
      border-radius: 14px;
      padding: 14px 15px;
      display: flex;
      gap: 11px;
      align-items: flex-start;
      margin-bottom: 8px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, .15);
    }

    #greeting .ico {
      font-size: 21px;
      flex-shrink: 0;
      margin-top: 1px
    }

    #greeting p {
      font-size: 13px;
      color: rgba(255, 255, 255, .92);
      line-height: 1.55
    }

    /* Row layout */
    .row {
      display: flex;
      flex-direction: column;
      max-width: 80%;
      min-width: 0;
      /* Prevent the bubble content from stretching wider than max-width.
         word-break alone isn't enough — the row itself needs to shrink. */
      width: fit-content;
    }

    .row.me {
      align-self: flex-end;
      align-items: flex-end;
      /* Ensure customer bubbles never exceed 80% and long words wrap */
      max-width: 80%;
    }

    .row.them {
      align-self: flex-start;
      align-items: flex-start
    }

    .row.sys {
      align-self: center;
      max-width: 100%
    }

    .row+.row.me,
    .row+.row.them {
      margin-top: 2px
    }

    .row.me+.row.them,
    .row.them+.row.me {
      margin-top: 12px
    }

    /* ─── Text bubble ─────────────────────────────────────────────────── */
    .bub {
      padding: 9px 13px;
      border-radius: var(--r);
      font-size: 13.5px;
      line-height: 1.55;
      word-break: break-word;
      overflow-wrap: anywhere;
      min-width: 0;
      /* Don't let a wide bub force the row wider than max-width */
      max-width: 100%;
    }

    .row.me .bub {
      background: var(--p);
      color: #fff;
      border-bottom-right-radius: 4px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, .15);
    }

    .row.them .bub {
      background: var(--sur);
      color: var(--txt);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--bdr);
      box-shadow: 0 1px 4px rgba(0, 0, 0, .06);
    }

    .row.sys .bub {
      background: transparent;
      color: var(--mut);
      font-size: 11px;
      text-align: center;
      padding: 3px 0
    }

    /* ─── Deleted message bubble ──────────────────────────────────────── */
    .bub-deleted {
      padding: 9px 13px;
      border-radius: var(--r);
      font-size: 13px;
      line-height: 1.55;
      font-style: italic;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .row.me .bub-deleted {
      background: rgba(37, 99, 235, 0.45);
      color: rgba(255, 255, 255, 0.7);
      border-bottom-right-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .row.them .bub-deleted {
      background: #f1f5f9;
      color: #94a3b8;
      border-bottom-left-radius: 4px;
      border: 1px solid var(--bdr);
    }

    .bub-deleted-icon {
      font-size: 14px;
      flex-shrink: 0;
      opacity: 0.75;
    }

    /* ─── Quoted / reply preview inside bubble ───────────────────────── */
    .quoted-preview {
      border-radius: 8px;
      padding: 6px 10px;
      margin-bottom: 5px;
      font-size: 12px;
      line-height: 1.45;
      cursor: default;
      overflow: hidden;
    }

    .row.me .quoted-preview {
      border-left: 3px solid rgba(255, 255, 255, 0.6);
      background: rgba(0, 0, 0, 0.15);
    }

    .row.them .quoted-preview {
      border-left: 3px solid var(--p);
      background: rgba(37, 99, 235, 0.07);
    }

    .quoted-preview-sender {
      font-size: 10.5px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .row.me .quoted-preview-sender {
      color: rgba(255, 255, 255, 0.85);
    }

    .row.them .quoted-preview-sender {
      color: var(--p);
    }

    .quoted-preview-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0.75;
    }

    .row.me .quoted-preview-text {
      color: rgba(255, 255, 255, 0.9);
    }

    .row.them .quoted-preview-text {
      color: var(--txt);
    }

    /* ─── Image bubble ────────────────────────────────────────────────── */
    .bub-img {
      border-radius: var(--r);
      overflow: hidden;
      max-width: 220px;
      cursor: zoom-in;
      display: block;
      box-shadow: 0 2px 10px rgba(0, 0, 0, .14);
    }

    .row.me .bub-img {
      border-bottom-right-radius: 4px
    }

    .row.them .bub-img {
      border-bottom-left-radius: 4px
    }

    .bub-img img {
      width: 100%;
      display: block;
      max-height: 200px;
      object-fit: cover
    }

    /* ─── Video bubble ────────────────────────────────────────────────── */
    .bub-video {
      width: 220px;
      border-radius: var(--r);
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 2px 10px rgba(0, 0, 0, .14);
      background: #000;
      position: relative;
    }

    .row.me .bub-video {
      border-bottom-right-radius: 4px
    }

    .row.them .bub-video {
      border-bottom-left-radius: 4px
    }

    .bub-video-preview {
      width: 100%;
      height: 148px;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    .bub-video-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 148px;
      background: rgba(0, 0, 0, .2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bub-video-play-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .92);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 14px rgba(0, 0, 0, .35);
      transition: transform .12s, background .12s;
    }

    .bub-video:hover .bub-video-play-btn {
      background: #fff;
      transform: scale(1.07)
    }

    .bub-video-bar {
      padding: 7px 11px 9px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .row.me .bub-video-bar {
      background: var(--pd)
    }

    .row.them .bub-video-bar {
      background: #f8fafc;
      border-top: 1px solid #e8edf3
    }

    .bub-video-fname {
      flex: 1;
      font-size: 11.5px;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .row.me .bub-video-fname {
      color: #fff
    }

    .row.them .bub-video-fname {
      color: var(--txt)
    }

    .bub-video-fsz {
      font-size: 10px;
      flex-shrink: 0
    }

    .row.me .bub-video-fsz {
      color: rgba(255, 255, 255, .6)
    }

    .row.them .bub-video-fsz {
      color: var(--mut)
    }

    /* ─── Inline video modal ─────────────────────────────────────────── */
    #vm {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 50;
      background: #000;
      flex-direction: column;
    }

    #vm.show {
      display: flex
    }

    #vm-top {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 10px 12px;
      z-index: 51;
      display: flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(to bottom, rgba(0, 0, 0, .72), transparent);
    }

    #vm-close {
      background: rgba(255, 255, 255, .18);
      border: none;
      color: #fff;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 16px;
      transition: background .15s;
    }

    #vm-close:hover {
      background: rgba(255, 255, 255, .3)
    }

    #vm-title {
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    #vm video {
      flex: 1;
      width: 100%;
      object-fit: contain;
      outline: none;
      padding-top: 44px;
      pointer-events: none;
    }

    #vm-tap-overlay {
      position: absolute;
      inset: 44px 0 0 0;
      z-index: 52;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #vm-play-icon {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .22);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity .25s, transform .2s;
      pointer-events: none;
    }

    #vm-play-icon.hidden {
      opacity: 0;
      transform: scale(0.8);
    }

    /* ─── File bubble ─────────────────────────────────────────────────── */
    .bub-file {
      padding: 11px 13px;
      border-radius: var(--r);
      display: flex;
      align-items: center;
      gap: 11px;
      cursor: pointer;
      text-decoration: none;
      min-width: 180px;
      max-width: 240px;
      transition: opacity .15s;
    }

    .bub-file:hover {
      opacity: .88
    }

    .row.me .bub-file {
      background: var(--p);
      border-bottom-right-radius: 4px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, .15);
    }

    .row.them .bub-file {
      background: var(--sur);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--bdr);
      box-shadow: 0 1px 4px rgba(0, 0, 0, .06);
    }

    .f-ico {
      width: 40px;
      height: 40px;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .row.me .f-ico {
      background: rgba(255, 255, 255, .2)
    }

    .row.them .f-ico {
      background: var(--bg)
    }

    .f-info {
      overflow: hidden;
      flex: 1
    }

    .f-name {
      font-size: 12.5px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .row.me .f-name {
      color: #fff
    }

    .row.them .f-name {
      color: var(--txt)
    }

    .f-sz {
      font-size: 10.5px;
      margin-top: 2px
    }

    .row.me .f-sz {
      color: rgba(255, 255, 255, .65)
    }

    .row.them .f-sz {
      color: var(--mut)
    }

    .f-dl {
      flex-shrink: 0;
      opacity: .75
    }

    .row.me .f-dl {
      color: #fff
    }

    .row.them .f-dl {
      color: var(--p)
    }

    .f-msg {
      font-size: 12px;
      color: var(--txt-muted);
      margin-top: 4px;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .row.me .f-msg {
      color: rgba(255, 255, 255, 0.85);
    }

    .row.them .f-msg {
      color: var(--txt);
    }

    /* ─── Voice bubble ────────────────────────────────────────────────── */
    .bub-voice {
      padding: 10px 13px;
      border-radius: var(--r);
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 210px;
      max-width: 240px;
    }

    .row.me .bub-voice {
      background: var(--p);
      border-bottom-right-radius: 4px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, .15);
    }

    .row.them .bub-voice {
      background: var(--sur);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--bdr);
      box-shadow: 0 1px 4px rgba(0, 0, 0, .06);
    }

    .v-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform .1s, opacity .1s;
    }

    .v-btn:active {
      transform: scale(.9)
    }

    .row.me .v-btn {
      background: rgba(255, 255, 255, .22)
    }

    .row.them .v-btn {
      background: var(--p)
    }

    .v-right {
      flex: 1;
      min-width: 0
    }

    .v-wf {
      display: flex;
      align-items: center;
      gap: 2px;
      height: 22px;
      margin-bottom: 4px
    }

    .v-bar {
      width: 3px;
      border-radius: 2px;
      flex-shrink: 0;
      transition: background .1s
    }

    .row.me .v-bar {
      background: rgba(255, 255, 255, .3)
    }

    .row.them .v-bar {
      background: #cbd5e1
    }

    .row.me .v-bar.act {
      background: rgba(255, 255, 255, .92)
    }

    .row.them .v-bar.act {
      background: var(--p)
    }

    /* ─── Seek slider ─────────────────────────────────────────────────── */
    .v-seek {
      width: 100%;
      height: 4px;
      border-radius: 2px;
      appearance: none;
      -webkit-appearance: none;
      outline: none;
      cursor: pointer;
      margin-bottom: 4px;
      background: transparent;
    }

    .v-seek::-webkit-slider-runnable-track {
      height: 4px;
      border-radius: 2px;
    }

    .row.me .v-seek::-webkit-slider-runnable-track {
      background: rgba(255, 255, 255, .28);
    }

    .row.them .v-seek::-webkit-slider-runnable-track {
      background: #e2e8f0;
    }

    .v-seek::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-top: -3px;
    }

    .row.me .v-seek::-webkit-slider-thumb {
      background: #fff;
    }

    .row.them .v-seek::-webkit-slider-thumb {
      background: var(--p);
    }

    .v-seek::-moz-range-track {
      height: 4px;
      border-radius: 2px;
    }

    .row.me .v-seek::-moz-range-track {
      background: rgba(255, 255, 255, .28);
    }

    .row.them .v-seek::-moz-range-track {
      background: #e2e8f0;
    }

    .v-seek::-moz-range-thumb {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: none;
    }

    .row.me .v-seek::-moz-range-thumb {
      background: #fff;
    }

    .row.them .v-seek::-moz-range-thumb {
      background: var(--p);
    }

    .row.me .v-seek {
      accent-color: #fff;
    }

    .row.them .v-seek {
      accent-color: var(--p);
    }

    /* ─── Link colors ─────────────────────────────────────────────────── */
    .row.me a.chat-link {
      color: rgba(255, 255, 255, 0.92) !important;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    /* ─── Quoted / reply bubble (legacy — kept for compat) ───────────── */
    .quoted {
      border-radius: 8px;
      padding: 6px 10px;
      margin-bottom: 5px;
      cursor: pointer;
      font-size: 12px;
      line-height: 1.45;
      border-left: 3px solid rgba(255, 255, 255, .6);
      background: rgba(255, 255, 255, .18);
      max-width: 100%;
      overflow: hidden;
    }

    .row.them .quoted {
      border-left-color: var(--p);
      background: rgba(37, 99, 235, .08);
    }

    .quoted-sender {
      font-size: 10.5px;
      font-weight: 600;
      margin-bottom: 2px;
      opacity: .85;
    }

    .quoted-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: .8;
    }

    .row--highlight {
      animation: highlight-flash 1.6s ease;
    }

    @keyframes highlight-flash {
      0% {
        background: rgba(37, 99, 235, .18);
        border-radius: 10px;
      }

      60% {
        background: rgba(37, 99, 235, .18);
        border-radius: 10px;
      }

      100% {
        background: transparent;
      }
    }

    /* ─── Reply hint button ───────────────────────────────────────────── */
    /* Wrap each "them" row in a .row-wrap so the hover zone covers both
       the bubble AND the reply button — mouse never leaves the target. */
    .row-wrap {
      display: flex;
      align-items: center;
      gap: 4px;
      align-self: flex-start;
      /* Span the same width budget as the message list so the inner .row
         can grow freely up to 80% of #msgs. The reply button (28px) sits
         outside this and never compresses the bubble. */
      width: 100%;
      position: relative;
    }

    /* The row inside the wrapper should be free to use up to 80% of the
       wrapper (which is 100% of #msgs minus padding). Without this override
       the bubble is double-constrained: 80% of wrapper which is itself
       capped, giving a very narrow column on long messages. */
    .row-wrap>.row.them {
      max-width: calc(100% - 36px);
      flex: 1;
      min-width: 0;
    }

    .reply-hint {
      display: none;
      /* hidden until parent hovered */
      flex-shrink: 0;
      background: rgba(255, 255, 255, .92);
      border: 1px solid var(--bdr);
      border-radius: 50%;
      width: 28px;
      height: 28px;
      align-items: center;
      justify-content: center;
      box-shadow: 0 1px 6px rgba(0, 0, 0, .12);
      cursor: pointer;
      color: var(--p);
      order: 2;
      /* always sits to the right of the bubble */
    }

    /* Show when hovering the wrapper (covers bubble + button gap) */
    .row-wrap:hover .reply-hint {
      display: flex;
    }

    /* ─── Reply-to bar ────────────────────────────────────────────────── */
    #reply-bar {
      display: none;
      align-items: center;
      gap: 9px;
      padding: 7px 11px;
      background: #f0f4ff;
      border-top: 1px solid #c7d7fb;
      flex-shrink: 0;
    }

    #reply-bar.show {
      display: flex;
    }

    #reply-bar-line {
      width: 3px;
      align-self: stretch;
      border-radius: 3px;
      background: var(--p);
      flex-shrink: 0;
    }

    #reply-bar-body {
      flex: 1;
      min-width: 0;
    }

    #reply-bar-sender {
      font-size: 11px;
      font-weight: 600;
      color: var(--p);
      margin-bottom: 2px;
    }

    #reply-bar-text {
      font-size: 12px;
      color: var(--mut);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #btn-cancel-reply {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--mut);
      display: flex;
      padding: 3px;
      border-radius: 5px;
      flex-shrink: 0;
    }

    #btn-cancel-reply:hover {
      color: #ef4444;
    }

    .row.them a.chat-link {
      color: var(--p) !important;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    /* ─── Meta row ────────────────────────────────────────────────────── */
    .sender-nm {
      font-size: 10.5px;
      font-weight: 600;
      color: var(--mut);
      margin-bottom: 3px;
      padding: 0 3px;
    }

    .ts {
      font-size: 10.5px;
      color: var(--mut);
      margin-top: 3px;
      padding: 0 3px;
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .tk {
      font-size: 10.5px;
      font-weight: 700;
      line-height: 1
    }

    .tk-s {
      color: #94a3b8
    }

    .tk-d {
      color: #64748b
    }

    .tk-r {
      color: var(--p)
    }

    /* ─── Typing indicator ────────────────────────────────────────────── */
    #typing {
      display: none;
      align-self: flex-start;
      margin-top: 4px
    }

    #typing.on {
      display: flex
    }

    .t-bub {
      background: var(--sur);
      border: 1px solid var(--bdr);
      border-radius: var(--r);
      border-bottom-left-radius: 4px;
      padding: 11px 15px;
      display: flex;
      gap: 5px;
      align-items: center;
      box-shadow: 0 1px 4px rgba(0, 0, 0, .06);
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #94a3b8;
      animation: bop 1.2s infinite
    }

    .dot:nth-child(2) {
      animation-delay: .22s
    }

    .dot:nth-child(3) {
      animation-delay: .44s
    }

    @keyframes bop {

      0%,
      60%,
      100% {
        transform: translateY(0)
      }

      30% {
        transform: translateY(-5px)
      }
    }

    /* ─── Input area ──────────────────────────────────────────────────── */
    #input-area {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      padding: 8px 10px 9px;
      background: var(--sur);
      border-top: 1px solid var(--bdr);
      flex-shrink: 0;
    }

    .ia-btn {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      border-radius: 10px;
      border: 1.5px solid var(--bdr);
      background: #f8fafc;
      color: var(--mut);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color .15s, color .15s, background .15s;
    }

    .ia-btn:hover {
      border-color: var(--p);
      color: var(--p)
    }

    #file-input {
      display: none
    }

    #msg-input {
      flex: 1;
      resize: none;
      border: 1.5px solid var(--bdr);
      border-radius: 12px;
      padding: 9px 13px;
      font-family: var(--fn);
      font-size: 13.5px;
      line-height: 1.45;
      outline: none;
      max-height: 110px;
      min-height: 38px;
      overflow-y: auto;
      transition: border-color .15s;
      color: var(--txt);
      background: #f8fafc;
    }

    #msg-input:focus {
      border-color: var(--p);
      background: #fff
    }

    #msg-input::placeholder {
      color: #94a3b8
    }

    #msg-input:disabled {
      opacity: .5;
      cursor: not-allowed
    }

    #btn-voice.rec {
      border-color: #ef4444;
      background: #fef2f2;
      color: #ef4444;
      animation: pulse 1s infinite
    }

    .bub-img-wrap {
      border-bottom-right-radius: 4px;
      border-radius: var(--r);
    }

    .row.me .bub-img-wrap {
      border-bottom-right-radius: 4px;
    }

    .row.them .bub-img-wrap {
      border-bottom-left-radius: 4px;
    }

    .row.me .bub-img-wrap div,
    .row.me [data-url-video] div {
      color: rgba(255, 255, 255, 0.92);
    }

    .row.them .bub-img-wrap div,
    .row.them [data-url-video] div {
      color: var(--txt);
    }


    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .55
      }
    }

    #btn-send {
      width: 38px;
      height: 38px;
      flex-shrink: 0;
      border-radius: 12px;
      border: none;
      background: var(--p);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s, transform .1s;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .2);
    }

    #btn-send:hover {
      background: var(--pd)
    }

    #btn-send:active {
      transform: scale(.92)
    }

    #btn-send:disabled {
      opacity: .4;
      cursor: not-allowed;
      box-shadow: none
    }

    /* ─── Preview & rec bars ──────────────────────────────────────────── */
    #prev-bar {
      display: none;
      align-items: center;
      gap: 9px;
      padding: 7px 11px;
      background: #f8fafc;
      border-top: 1px solid var(--bdr);
      flex-shrink: 0;
    }

    #prev-bar.show {
      display: flex
    }

    #prev-thumb {
      width: 36px;
      height: 36px;
      border-radius: 7px;
      object-fit: cover;
      display: none
    }

    #prev-thumb.show {
      display: block
    }

    #prev-icon {
      font-size: 24px;
      display: none
    }

    #prev-icon.show {
      display: block
    }

    #prev-name {
      flex: 1;
      font-size: 12px;
      font-weight: 500;
      color: var(--txt);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    #prev-sz {
      font-size: 10.5px;
      color: var(--mut);
      flex-shrink: 0
    }

    #btn-cpf {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--mut);
      display: flex;
      padding: 3px;
      border-radius: 5px;
    }

    #btn-cpf:hover {
      color: #ef4444
    }

    #rec-bar {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: #fef2f2;
      border-top: 1px solid #fecaca;
      flex-shrink: 0;
    }

    #rec-bar.show {
      display: flex
    }

    #rec-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #ef4444;
      flex-shrink: 0;
      animation: pulse 1s infinite
    }

    #rec-time {
      font-size: 13px;
      font-weight: 600;
      color: #ef4444;
      flex: 1
    }

    #btn-crec {
      background: none;
      border: none;
      font-size: 12px;
      color: var(--mut);
      cursor: pointer;
      padding: 4px 9px;
      border-radius: 7px
    }

    #btn-crec:hover {
      color: #ef4444
    }

    /* ─── Name gate ───────────────────────────────────────────────────── */
    #gate {
      position: absolute;
      inset: 0;
      background: var(--bg);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 36px 24px;
      gap: 13px;
    }

    #gate h2 {
      font-size: 18px;
      font-weight: 600;
      text-align: center;
      line-height: 1.4
    }

    #gate .sub {
      font-size: 13px;
      color: var(--mut);
      text-align: center
    }

    .gi {
      width: 100%;
      border: 1.5px solid var(--bdr);
      border-radius: 11px;
      padding: 12px 14px;
      font-family: var(--fn);
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
      background: var(--sur);
      color: var(--txt);
    }

    .gi:focus {
      border-color: var(--p)
    }

    #gate-err {
      color: #ef4444;
      font-size: 12px;
      display: none
    }

    #btn-start {
      width: 100%;
      padding: 13px;
      border-radius: 11px;
      border: none;
      background: linear-gradient(135deg, var(--p), var(--pd));
      color: #fff;
      font-family: var(--fn);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
      box-shadow: 0 2px 10px rgba(0, 0, 0, .18);
    }

    #btn-start:hover {
      opacity: .9;
    }

    /* ─── Lightbox ────────────────────────────────────────────────────── */
    #lb {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, .88);
      z-index: 100;
    }

    #lb.show {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #lb-inner {
      width: 100%;
      height: 100%;
      overflow: auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #lb img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 9px;
      object-fit: contain;
      cursor: zoom-in;
      user-select: none;
      transition: transform .25s;
      transform-origin: center center;
    }

    #lb-x {
      position: absolute;
      top: 13px;
      right: 13px;
      background: rgba(255, 255, 255, .18);
      border: none;
      color: #fff;
      border-radius: 9px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      font-size: 17px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 101;
    }

    /* ─── Agents ──────────────────────────────────────────────────────── */

    #hd-agents {
      display: flex;
      align-items: center;
      margin-top: 5px;
    }

    .ag-av-wrap {
      position: relative;
      margin-left: 4px;
      cursor: pointer;
    }

    .ag-av-wrap:first-child {
      margin-left: 0;
    }

    .ag-av,
    .ag-av-fb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, .7);
      object-fit: cover;
      background: rgba(255, 255, 255, .25);
      display: block;
      transition: transform .15s, z-index .15s;
    }

    .ag-av-fb {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
    }

    .ag-av-wrap:hover {
      z-index: 10;
    }

    .ag-av-wrap:hover .ag-av,
    .ag-av-wrap:hover .ag-av-fb {
      transform: translateY(-3px) scale(1.1);
    }

    .ag-tooltip {
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, .75);
      color: #fff;
      font-size: 10.5px;
      font-weight: 500;
      white-space: nowrap;
      padding: 3px 8px;
      border-radius: 6px;
      pointer-events: none;
      opacity: 0;
      transition: opacity .15s;
    }

    .ag-tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 4px solid transparent;
      border-top-color: rgba(0, 0, 0, .75);
    }

    .ag-av-wrap:hover .ag-tooltip {
      opacity: 1;
    }

    /* ─── Footer ──────────────────────────────────────────────────────── */
    #foot {
      text-align: center;
      font-size: 10px;
      color: #c0ccd8;
      padding: 4px 0 6px;
      background: var(--sur);
      flex-shrink: 0;
    }
  </style>
</head>

<body>

  <!-- ── Header ── -->
  <div id="hd">
    <div id="hd-av">💬</div>
    <div id="hd-info">
      <div id="hd-name"></div>
      <div id="hd-agents" style="display:none"></div>
    </div>
    <button id="btn-close" aria-label="Close">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>
  </div>

  <!-- ── Message list ── -->
  <div id="msgs">
    <div id="greeting">
      <span class="ico">👋</span>
      <p id="greet-text">Hi there!</p>
    </div>
    <div id="typing">
      <div class="t-bub">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>
    </div>
  </div>

  <!-- ── Inline video player ── -->
  <div id="vm">
    <div id="vm-top">
      <button id="vm-close">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
      <span id="vm-title">Video</span>
    </div>
    <video id="vm-vid" playsinline></video>
    <div id="vm-tap-overlay">
      <div id="vm-play-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="#fff">
          <path d="M8 5v14l11-7z" />
        </svg>
      </div>
    </div>
  </div>

  <!-- ── Voice recording indicator ── -->
  <div id="rec-bar">
    <span id="rec-dot"></span>
    <span id="rec-time">0:00</span>
    <button id="btn-crec">Cancel</button>
  </div>

  <!-- ── File preview bar ── -->
  <div id="prev-bar">
    <img id="prev-thumb" alt="preview" />
    <span id="prev-icon"></span>
    <span id="prev-name"></span>
    <span id="prev-sz"></span>
    <button id="btn-cpf" aria-label="Remove">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>
  </div>

  <!-- ── Reply-to bar ── -->
  <div id="reply-bar">
    <div id="reply-bar-line"></div>
    <div id="reply-bar-body">
      <div id="reply-bar-sender"></div>
      <div id="reply-bar-text"></div>
    </div>
    <button id="btn-cancel-reply" aria-label="Cancel reply">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>
  </div>

  <!-- ── Input ── -->
  <div id="input-area">
    <button id="btn-attach" class="ia-btn" aria-label="Attach">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path
          d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66L9.41 17.41a2 2 0 01-2.83-2.83l8.49-8.48" />
      </svg>
    </button>
    <input type="file" id="file-input" accept="image/*,video/*,.pdf,.xlsx,.xls,.doc,.docx,.ppt,.pptx,.zip,.txt,.csv" />
    <textarea id="msg-input" placeholder="Type a message…" rows="1" disabled></textarea>
    <button id="btn-voice" class="ia-btn" aria-label="Record voice">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
        <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
        <line x1="12" y1="19" x2="12" y2="23" />
        <line x1="8" y1="23" x2="16" y2="23" />
      </svg>
    </button>
    <button id="btn-send" disabled>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path
          d="M3.4 20.4l17-8.5a1 1 0 000-1.8l-17-8.5A1 1 0 002 3.5l3.1 7.8a1 1 0 00.9.7h6a1 1 0 010 2h-6a1 1 0 00-.9.7L2 22.5a1 1 0 001.4-.1z" />
      </svg>
    </button>
  </div>

  <div id="foot">Powered by PayRecon</div>

  <!-- ── Name gate ── -->
  <div id="gate">
    <h2>👋 Before we begin</h2>
    <p class="sub">Enter your name so we know who we're talking to.</p>
    <input class="gi" id="g-name" type="text" placeholder="Your name" maxlength="60" />
    <input class="gi" id="g-email" type="email" placeholder="Email address (optional)" maxlength="120" />
    <p id="gate-err">Please enter your name to continue.</p>
    <button id="btn-start">Start Chat</button>
  </div>

  <!-- ── Image lightbox ── -->
  <div id="lb">
    <button id="lb-x">✕</button>
    <div id="lb-inner">
      <img id="lb-img" src="" alt="full size" />
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      /* ── Config ─────────────────────────────────────────────────────────── */
      var q = new URLSearchParams(window.location.search);
      var MID = q.get('merchantId') || '';
      var PRI = q.get('primaryColor') || '#2563eb';
      var SEC = q.get('secondaryColor') || '#1d4ed8';
      var BRAND = q.get('brandName') || 'Support';
      var GREET = q.get('greeting') || 'Hi there! How can we help you today?';
      var API = q.get('apiUrl') || 'http://localhost:3000';
      var WHS = q.get('whSecret') || '';
      var UCID = q.get('customerId') || null;
      var UCNM = q.get('customerName') || null;
      var UCEM = q.get('customerEmail') || null;
      var UCRG = q.get('customerRegion') || null;

      document.documentElement.style.setProperty('--p', PRI);
      document.documentElement.style.setProperty('--pd', SEC);
      document.getElementById('hd-name').textContent = BRAND;
      document.getElementById('greet-text').textContent = GREET;

      (function loadAgents() {
        var hdAgents = document.getElementById('hd-agents');

        fetch('https://v2.payrecon.co/console/api/multichat/activeSupport', {
          headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' }
        })
          .then(function (r) { return r.json(); })
          .then(function (body) {
            if (body.error || !body.data || !body.data.length) return;

            body.data.slice(0, 5).forEach(function (ag, i) {
              var wrap = document.createElement('div');
              wrap.className = 'ag-av-wrap';
              wrap.style.zIndex = String(10 - i);

              var avEl;
              if (ag.profile_picture) {
                avEl = document.createElement('img');
                avEl.className = 'ag-av';
                avEl.src = ag.profile_picture;
                avEl.alt = ag.name || '';
                avEl.onerror = function () {
                  var fb = makeFallback(ag.name);
                  wrap.replaceChild(fb, avEl);
                };
              } else {
                avEl = makeFallback(ag.name);
              }

              var tip = document.createElement('div');
              tip.className = 'ag-tooltip';
              tip.textContent = ag.name || '';

              wrap.appendChild(avEl);
              wrap.appendChild(tip);
              hdAgents.appendChild(wrap);
            });

            hdAgents.style.display = 'flex';
          })
          .catch(function () { });

        function makeFallback(name) {
          var el = document.createElement('div');
          el.className = 'ag-av-fb';
          el.textContent = (name || '?')[0].toUpperCase();
          return el;
        }
      })();

      /* ── Session ─────────────────────────────────────────────────────────── */
      var SK = 'cw_' + MID;
      function loadSess() { try { return JSON.parse(localStorage.getItem(SK) || 'null'); } catch (e) { return null; } }
      function saveSess(s) { sess = s; try { localStorage.setItem(SK, JSON.stringify(s)); } catch (e) { } }
      var sess = loadSess();

      /* ── UI refs ─────────────────────────────────────────────────────────── */
      var gate = document.getElementById('gate');
      var gName = document.getElementById('g-name');
      var gEmail = document.getElementById('g-email');
      var gErr = document.getElementById('gate-err');
      var btnStart = document.getElementById('btn-start');
      var input = document.getElementById('msg-input');
      var btnSend = document.getElementById('btn-send');
      var msgs = document.getElementById('msgs');
      var typing = document.getElementById('typing');
      var btnAtt = document.getElementById('btn-attach');
      var fInput = document.getElementById('file-input');
      var btnVoice = document.getElementById('btn-voice');
      var prevBar = document.getElementById('prev-bar');
      var prevThumb = document.getElementById('prev-thumb');
      var prevIcon = document.getElementById('prev-icon');
      var prevName = document.getElementById('prev-name');
      var prevSz = document.getElementById('prev-sz');
      var btnCPF = document.getElementById('btn-cpf');
      var recBar = document.getElementById('rec-bar');
      var recTime = document.getElementById('rec-time');
      var btnCRec = document.getElementById('btn-crec');
      var replyBar = document.getElementById('reply-bar');
      var replyBarSender = document.getElementById('reply-bar-sender');
      var replyBarText = document.getElementById('reply-bar-text');
      var btnCancelReply = document.getElementById('btn-cancel-reply');
      var lb = document.getElementById('lb');
      var lbImg = document.getElementById('lb-img');
      var lbX = document.getElementById('lb-x');
      var vm = document.getElementById('vm');
      var vmVid = document.getElementById('vm-vid');
      var vmClose = document.getElementById('vm-close');
      var vmTitle = document.getElementById('vm-title');
      var vmTapOverlay = document.getElementById('vm-tap-overlay');
      var vmPlayIcon = document.getElementById('vm-play-icon');

      /* ── State ───────────────────────────────────────────────────────────── */
      var staged = null;
      var recMR = null, recChunks = [], recSecs = 0, recTimer = null, recOn = false;
      var pollT = null, pollInterval = 5000, lastHash = '', sending = false;
      var ws = null, wsReady = false;
      var audios = {};
      var isWidgetVisible = false;
      // Reply state
      var replyTo = null; // { quotedText, quotedSender }

      /* ── Boot ────────────────────────────────────────────────────────────── */
      if (UCID) {
        var cid = 'merchant_' + UCID;
        if (!sess || sess.customerId !== UCID)
          saveSess({
            customerId: UCID, customerName: UCNM || 'Customer', customerEmail: UCEM || null, customerRegion: UCRG || null,
            channelConversationId: cid, conversationId: null
          });
        gate.style.display = 'none'; startChat();
      } else if (sess && sess.customerId) {
        gate.style.display = 'none'; startChat();
      }

      /* ── Gate ────────────────────────────────────────────────────────────── */
      btnStart.addEventListener('click', doGate);
      gName.addEventListener('keydown', function (e) { if (e.key === 'Enter') doGate(); });
      function doGate() {
        var n = gName.value.trim();
        if (!n) { gErr.style.display = 'block'; return; }
        gErr.style.display = 'none';
        var id = 'anon_' + Math.random().toString(36).slice(2) + Date.now();
        saveSess({
          customerId: id, customerName: n, customerEmail: gEmail.value.trim() || null, customerRegion: UCRG || null,
          channelConversationId: id, conversationId: null
        });
        gate.style.display = 'none'; startChat();
      }

      /* ── Video modal ─────────────────────────────────────────────────────── */
      function openVM(url, name) {
        vmVid.src = url;
        vmTitle.textContent = name || 'Video';
        vm.classList.add('show');
        vmPlayIcon.classList.remove('hidden');

        vmVid.play().catch(function () { });

      });

      /* ── Lightbox ────────────────────────────────────────────────────────── */
      var lb = document.getElementById('lb');
      var lbInner = document.getElementById('lb-inner');
      var lbImg = document.getElementById('lb-img');
      var lbX = document.getElementById('lb-x');
      var lbZoomed = false;
      var lbScale = 1, lbOx = 0, lbOy = 0;
      var lbDragging = false;

      function lbApplyTransform() {
        lbImg.style.transform = 'translate(' + lbOx + 'px,' + lbOy + 'px) scale(' + lbScale + ')';
        lbImg.style.transformOrigin = 'center center';
      }

      function lbReset() {
        lbScale = 1; lbOx = 0; lbOy = 0; lbZoomed = false;
        lbImg.style.cursor = 'zoom-in';
        lbApplyTransform();
      }

      function openLightbox(src) {
        lbReset();
        lbImg.src = src;
        lb.classList.add('show');
      }

      function closeLightbox() {
        lb.classList.remove('show');
        lbReset();
      }

      lbImg.addEventListener('click', function (e) {
        if (lbDragging) return;
        e.stopPropagation();
        if (!lbZoomed) {
          lbScale = 2.5; lbZoomed = true;
          lbImg.style.cursor = 'grab';
        } else {
          lbReset();
        }
        lbApplyTransform();
      });

      lbImg.addEventListener('mousedown', function (e) {
        if (!lbZoomed) return;
        e.preventDefault();
        var startX = e.clientX, startY = e.clientY;
        var startOx = lbOx, startOy = lbOy;
        lbImg.style.cursor = 'grabbing';

        function onMove(ev) {
          lbDragging = true;
          lbOx = startOx + ev.clientX - startX;
          lbOy = startOy + ev.clientY - startY;
          lbApplyTransform();
        }
        function onUp() {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          lbImg.style.cursor = 'grab';
          setTimeout(function () { lbDragging = false; }, 0);
        }
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });

      var lbT0 = null, lbPinch0 = 0, lbScale0 = 1;
      lbImg.addEventListener('touchstart', function (e) {
        if (e.touches.length === 1) {
          lbT0 = { x: e.touches[0].clientX, y: e.touches[0].clientY, ox: lbOx, oy: lbOy };
          lbDragging = false;
        } else if (e.touches.length === 2) {
          lbPinch0 = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
          );
          lbScale0 = lbScale; lbT0 = null;
        }
      }, { passive: true });

      lbImg.addEventListener('touchmove', function (e) {
        if (e.touches.length === 2) {
          e.preventDefault();
          var dist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
          );
          lbScale = Math.max(1, Math.min(5, lbScale0 * dist / lbPinch0));
          lbZoomed = lbScale > 1;
          lbImg.style.cursor = lbZoomed ? 'grab' : 'zoom-in';
          lbApplyTransform();
        } else if (e.touches.length === 1 && lbT0 && lbZoomed) {
          lbDragging = true;
          lbOx = lbT0.ox + e.touches[0].clientX - lbT0.x;
          lbOy = lbT0.oy + e.touches[0].clientY - lbT0.y;
          lbApplyTransform();
        }
      }, { passive: false });

      lbImg.addEventListener('touchend', function () {
        setTimeout(function () { lbDragging = false; }, 50);
      });

      lbX.addEventListener('click', closeLightbox);
      lb.addEventListener('click', function (e) {
        if (e.target === lb || e.target === lbInner) closeLightbox();
      });

      /* ── Chat init ───────────────────────────────────────────────────────── */
      function startChat() {
        input.removeAttribute('disabled');

        input.addEventListener('input', function () {
          this.style.height = 'auto';
          this.style.height = Math.min(this.scrollHeight, 110) + 'px';
          updSend();
        });
        input.addEventListener('keydown', function (e) {
          if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!btnSend.disabled && !sending) doSend(); }
        });
        btnSend.addEventListener('click', function () { if (!sending) doSend(); });
        btnAtt.addEventListener('click', function () { fInput.click(); });
        fInput.addEventListener('change', function () {
          if (fInput.files && fInput.files[0]) stageFile(fInput.files[0]);
          fInput.value = '';
        });
        btnCPF.addEventListener('click', clearStaged);
        btnVoice.addEventListener('click', function () { recOn ? stopRec(true) : startRec(); });
        btnCRec.addEventListener('click', function () { stopRec(false); });
        btnCancelReply.addEventListener('click', clearReply);

        if (sess.conversationId) { fetchMsgs(); markSeen(); connectWS(); }
        else resolveConv();
      }

      function updSend() { btnSend.disabled = !(input.value.trim() || staged) || sending; }

      /* ── Reply state ─────────────────────────────────────────────────────── */
      function setReply(quotedText, quotedSender) {
        replyTo = { quotedText: quotedText, quotedSender: quotedSender };
        replyBarSender.textContent = quotedSender || 'Support';
        replyBarText.textContent = quotedText || '';
        replyBar.classList.add('show');
        input.focus();
      }

      function clearReply() {
        replyTo = null;
        replyBar.classList.remove('show');
      }

      /* ── Stage file ──────────────────────────────────────────────────────── */
      function stageFile(file) {
        var type = mime2type(file.type);
        var url = type === 'image' || type === 'video' ? URL.createObjectURL(file) : null;
        staged = { file: file, previewUrl: url, messageType: type };

        prevThumb.classList.remove('show'); prevIcon.classList.remove('show');
        if (type === 'image' && url) { prevThumb.src = url; prevThumb.classList.add('show'); }
        else { prevIcon.textContent = typeIco(type); prevIcon.classList.add('show'); }
        prevName.textContent = file.name;
        prevSz.textContent = fmtBytes(file.size);
        prevBar.classList.add('show');
        updSend();
      }
      function clearStaged() {
        if (staged && staged.previewUrl) URL.revokeObjectURL(staged.previewUrl);
        staged = null; prevBar.classList.remove('show');
        prevThumb.classList.remove('show'); prevIcon.classList.remove('show');
        updSend();
      }

      /* ── Voice recording ─────────────────────────────────────────────────── */
      async function startRec() {
        try {
          var stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          recChunks = []; recSecs = 0;
          var mt = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus'
            : MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : '';
          recMR = mt ? new MediaRecorder(stream, { mimeType: mt }) : new MediaRecorder(stream);
          recMR.ondataavailable = function (e) { if (e.data && e.data.size > 0) recChunks.push(e.data); };
          recMR.onstop = function () { stream.getTracks().forEach(function (t) { t.stop(); }); };
          recMR.start(200); recOn = true;
          btnVoice.classList.add('rec'); recBar.classList.add('show');
          recTimer = setInterval(function () {
            recSecs++;
            if (recSecs >= 120) { stopRec(true); return; }
            recTime.textContent = Math.floor(recSecs / 60) + ':' + (recSecs % 60 < 10 ? '0' : '') + recSecs % 60;
          }, 1000);
        } catch (e) {
          if (e.name === 'NotAllowedError') {
            sysMsg('Microphone access is blocked in this context. Please open the chat in a new tab to send voice messages.');
          } else {
            sysMsg('Microphone access denied.');
          }
        }
      }
      function stopRec(send) {
        if (!recMR || !recOn) return;
        recOn = false; clearInterval(recTimer); recTimer = null;
        recTime.textContent = '0:00'; btnVoice.classList.remove('rec'); recBar.classList.remove('show');
        if (send) {
          recMR.addEventListener('stop', function () {
            var ext = (recMR.mimeType || '').includes('mp4') ? 'm4a' : 'webm';
            var blob = new Blob(recChunks, { type: recMR.mimeType || 'audio/webm' });
            stageFile(new File([blob], 'voice_' + Date.now() + '.' + ext, { type: recMR.mimeType || 'audio/webm' }));
            doSend();
          }, { once: true });
        }
        recMR.stop();
      }

      /* ── Send ────────────────────────────────────────────────────────────── */
      async function doSend() {
        if (sending) return;
        var text = input.value.trim();
        if (!text && !staged) return;
        sending = true; btnSend.disabled = true;
        var fs = staged, tx = text;
        var rp = replyTo; // capture reply state before clearing
        input.value = ''; input.style.height = 'auto';
        if (fs) clearStaged();
        clearReply();

        if (fs) {
          addRow({
            senderType: 'customer', content: fs.file.name, messageType: fs.messageType,
            fileUrl: fs.previewUrl, fileName: fs.file.name, fileSizeBytes: fs.file.size,
            createdAt: new Date().toISOString(), status: 'sent',
            quotedText: rp ? rp.quotedText : null,
            quotedSender: rp ? rp.quotedSender : null
          });
        } else {
          addRow({
            senderType: 'customer', content: tx, messageType: 'text',
            createdAt: new Date().toISOString(), status: 'sent',
            quotedText: rp ? rp.quotedText : null,
            quotedSender: rp ? rp.quotedSender : null
          });
        }
        showTyping(true);

        try {
          if (fs) await sendFile(fs.file, tx, rp);
          else await sendText(tx, rp);
        } catch (e) {
          showTyping(false); sysMsg('Connection error. Check your network.');
        } finally {
          sending = false; updSend();
        }
      }

      /* ── FIX: always sync conversationId from server response ───────────── */
      function syncConvId(serverConvId) {
        if (!serverConvId) return;
        if (serverConvId !== sess.conversationId) {
          saveSess(Object.assign({}, sess, { conversationId: serverConvId }));
          if (ws) { ws.close(); ws = null; }
          wsReady = false;
          connectWS();
        } else if (!wsReady && !pollT) {
          connectWS();
        }
      }

      async function sendText(text, rp) {
        var body = {
          merchantId: MID, channelType: 'webstore',
          channelName: BRAND,
          channelConversationId: sess.channelConversationId,
          customerId: sess.customerId, customerName: sess.customerName,
          customerEmail: sess.customerEmail || null,
          customerRegion: sess.customerRegion || null,
          content: text
        };
        if (rp) {
          body.quotedText = rp.quotedText || null;
          body.quotedSender = rp.quotedSender || null;
        }
        var r = await fetch(API + '/webhooks/inbound', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-webhook-secret': WHS },
          body: JSON.stringify(body),
        });
        var d = await r.json();
        if (d.success) {
          syncConvId(d.conversationId);
          lastHash = '';
          setTimeout(function () { fetchMsgs(); showTyping(false); }, 1500);
        } else {
          showTyping(false); sysMsg('Failed to send. Please try again.');
        }
      }

      async function sendFile(file, caption, rp) {
        var fd = new FormData(); fd.append('file', file); fd.append('merchantId', MID);
        var ur = await fetch(API + '/upload/widget', { method: 'POST', headers: { 'x-webhook-secret': WHS }, body: fd });
        var ud = await ur.json();
        if (!ud.success) { showTyping(false); sysMsg('Upload failed: ' + (ud.message || 'Error')); return; }
        var body = {
          merchantId: MID, channelType: 'webstore',
          channelName: BRAND,
          channelConversationId: sess.channelConversationId,
          customerId: sess.customerId, customerName: sess.customerName,
          customerEmail: sess.customerEmail || null,
          customerRegion: sess.customerRegion || null,
          content: caption || null, fileUrl: ud.fileUrl, fileName: ud.fileName,
          fileMimeType: ud.fileMimeType, fileSizeBytes: ud.fileSizeBytes
        };
        if (rp) {
          body.quotedText = rp.quotedText || null;
          body.quotedSender = rp.quotedSender || null;
        }
        var r = await fetch(API + '/webhooks/inbound', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-webhook-secret': WHS },
          body: JSON.stringify(body),
        });
        var d = await r.json();
        if (d.success) {
          syncConvId(d.conversationId);
          lastHash = '';
          setTimeout(function () { fetchMsgs(); showTyping(false); }, 1500);
        } else {
          showTyping(false); sysMsg('Failed to send.');
        }
      }

      /* ── Fetch & render ──────────────────────────────────────────────────── */
      function fetchMsgs() {
        if (!sess || !sess.conversationId) return Promise.resolve();
        return fetch(
          API + '/webhooks/conversations/' + sess.conversationId + '/widget-messages',
          { headers: { 'x-webhook-secret': WHS } }
        )
          .then(function (r) { return r.json(); })
          .then(function (d) {
            if (!d.success || !d.messages) return;
            var hash = d.messages.map(function (m) {
              return m.id + ':' + m.content + ':' + (m.isEdited ? '1' : '0') + ':' + (m.status || '');
            }).join('|');
            if (hash !== lastHash) {
              var first = (lastHash === '');
              lastHash = hash;
              renderAll(d.messages);
              showTyping(false);
              var last = d.messages[d.messages.length - 1];
              if (!first && last && last.senderType !== 'customer') {
                if (isWidgetVisible) {
                  markSeen();
                } else {
                  var unseenCount = d.messages.filter(function (m) {
                    return m.senderType !== 'customer' && m.status !== 'seen';
                  }).length;
                  if (unseenCount > 0) {
                    window.parent.postMessage({ type: 'CW_UNREAD', count: unseenCount }, '*');
                  }
                }
              }
            }
          })
          .catch(function () { });
      }

      async function markSeen() {
        if (!sess || !sess.conversationId) return;
        try {
          await fetch(
            API + '/webhooks/conversations/' + sess.conversationId + '/seen',
            { method: 'POST', headers: { 'x-webhook-secret': WHS } }
          );
        } catch (e) { }
      }

      async function resolveConv() {
        if (!sess || !sess.channelConversationId) return;
        try {
          var r = await fetch(
            API + '/webhooks/conversations/by-channel/' + encodeURIComponent(sess.channelConversationId),
            { headers: { 'x-webhook-secret': WHS } }
          );
          var d = await r.json();
          if (d.success && d.conversationId) {
            saveSess(Object.assign({}, sess, { conversationId: d.conversationId }));
            fetchMsgs();
            connectWS();
            return;
          }
        } catch (e) { }
        startBackoffPoll();
      }

      function renderAll(list) {
        msgs.querySelectorAll('.row').forEach(function (n) { n.remove(); });
        list.forEach(function (m) { msgs.insertBefore(mkRow(m), typing); });
        scrollBot();
      }
      function addRow(m) { msgs.insertBefore(mkRow(m), typing); scrollBot(); }

      /* ── Build row ───────────────────────────────────────────────────────── */
      function mkRow(m) {
        var row = document.createElement('div');
        var isMe = m.senderType === 'customer';
        row.className = 'row ' + (isMe ? 'me' : 'them');

        var time = new Date(m.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        var nmHtml = (!isMe && m.senderName) ? '<div class="sender-nm">' + esc(m.senderName) + '</div>' : '';
        var editedHtml = m.isEdited && m.status !== 'deleted'
          ? '<span style="font-size:10px;font-style:italic;color:var(--mut);margin-right:3px">edited</span>'
          : '';
        var tkHtml = '';
        if (isMe) {
          var st = m.status || 'sent';
          if (st === 'seen') tkHtml = '<span class="tk tk-r">✓✓</span>';
          else if (st === 'delivered') tkHtml = '<span class="tk tk-d">✓✓</span>';
          else tkHtml = '<span class="tk tk-s">✓</span>';
        }

        var type = m.messageType || 'text';
        var isDeleted = m.status === 'deleted';
        var bub = '';

        // ── Deleted message ── render a special tombstone bubble
        if (isDeleted) {
          bub = '<div class="bub-deleted">'
            + '<span class="bub-deleted-icon">🚫</span>'
            + '<span>This message was deleted</span>'
            + '</div>';

          row.innerHTML = nmHtml + bub + '<div class="ts">' + time + '</div>';
          return row;
        }

        // ── Quoted/reply preview ── shown inside the bubble wrapper
        var quotedHtml = '';
        if (m.quotedText || m.quotedSender) {
          var qSender = esc(m.quotedSender || (isMe ? 'Support' : 'You'));
          var qText = esc(m.quotedText || '');
          // Detect media-type previews
          if (!qText) {
            if (m.quotedMsgId) qText = '📎 Attachment';
          }
          quotedHtml = '<div class="quoted-preview">'
            + '<div class="quoted-preview-sender">' + qSender + '</div>'
            + '<div class="quoted-preview-text">' + qText + '</div>'
            + '</div>';
        }

        if (type === 'image') {
          var url = esc(m.fileUrl || '');
          var name = esc(m.fileName || 'Image');

          if (m.content) {
            bub = '<div class="bub bub-img-wrap" style="padding:0;overflow:hidden;">'
              + (quotedHtml ? '<div style="padding:8px 10px 0;">' + quotedHtml + '</div>' : '')
              + '<div class="img-wrapper" style="position:relative;">'
              + '<img src="' + url + '" alt="' + name + '" loading="lazy" '
              + 'style="width:100%;display:block;max-height:220px;object-fit:cover;border-radius:0;cursor:zoom-in;" '
              + 'data-src="' + url + '"/>'
              + '</div>'
              + '<div style="padding:6px 10px 8px;font-size:13px;line-height:1.45;">'
              + linkify(esc(m.content))
              + '</div>'
              + '</div>';
          } else {
            bub = '<div class="bub-img" data-src="' + url + '">'
              + (quotedHtml ? '<div style="padding:8px 8px 0;">' + quotedHtml + '</div>' : '')
              + '<img src="' + url + '" alt="' + name + '" loading="lazy"/>'
              + '</div>';
          }
        } else if (type === 'video') {
          bub = mkVideoBub(m, quotedHtml);
        } else if (type === 'voice') {
          bub = mkVoiceBub(m);
        } else if (type === 'pdf' || type === 'excel' || type === 'file') {
          var ico = { pdf: '📄', excel: '📊', file: '📎' }[type] || '📎';
          bub = '<a class="bub-file" href="' + esc(m.fileUrl || '#') + '" target="_blank" rel="noopener">'
            + '<div class="f-ico">' + ico + '</div>'
            + '<div class="f-info">'
            + (quotedHtml ? quotedHtml : '')
            + '<div class="f-name">' + esc(m.fileName || 'File') + '</div>'
            + '<div class="f-sz">' + fmtBytes(m.fileSizeBytes) + '</div>'
            + (m.content ? '<div class="f-msg">' + linkify(esc(m.content)) + '</div>' : '')
            + '</div>'
            + '<svg class="f-dl" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>'
            + '</a>';
        } else {
          // plain text — wrap quoted + text together in one bubble
          bub = '<div class="bub">' + quotedHtml + linkify(esc(m.content || '')) + '</div>';
        }

        row.innerHTML = nmHtml + bub + '<div class="ts">' + editedHtml + time + tkHtml + '</div>';

        // Wire up image zoom
        row.querySelectorAll('img[data-src], .bub-img img, .bub-img-wrap img').forEach(function (img) {
          img.style.cursor = 'pointer';
          img.addEventListener('click', function (e) {
            e.stopPropagation();
            window.open(img.dataset.src || img.src, '_blank');
          });
        });

        var bubImg = row.querySelector('.bub-img[data-src]');
        if (bubImg) {
          bubImg.style.cursor = 'pointer';
          bubImg.addEventListener('click', function () {
            window.open(bubImg.dataset.src, '_blank');
          });
        }

        // Wire up video open
        var vb = row.querySelector('[data-url-video]');
        if (vb) vb.addEventListener('click', function () {
          window.open(this.dataset.urlVideo, '_blank');
        });

        // ── Swipe-to-reply on touch + desktop reply button (them only) ──
        if (!isMe) {
          var bubEl = row.querySelector('.bub, .bub-img, .bub-file, .bub-voice, [data-url-video], .bub-img-wrap');
          if (bubEl) {
            // Touch: swipe right to trigger reply
            var touchStartX = 0;
            var touchStartY = 0;
            var swiped = false;
            bubEl.addEventListener('touchstart', function (e) {
              touchStartX = e.touches[0].clientX;
              touchStartY = e.touches[0].clientY;
              swiped = false;
            }, { passive: true });
            bubEl.addEventListener('touchmove', function (e) {
              if (swiped) return;
              var dx = e.touches[0].clientX - touchStartX;
              var dy = Math.abs(e.touches[0].clientY - touchStartY);
              if (dx > 48 && dy < 30) {
                swiped = true;
                triggerReplyFor(m);
                row.style.transition = 'transform .15s';
                row.style.transform = 'translateX(10px)';
                setTimeout(function () {
                  row.style.transform = '';
                  setTimeout(function () { row.style.transition = ''; }, 150);
                }, 150);
              }
            }, { passive: true });
          }

          // Desktop: wrap row + reply button together so hover zone is continuous
          var replyBtn = document.createElement('button');
          replyBtn.className = 'reply-hint';
          replyBtn.setAttribute('aria-label', 'Reply');
          replyBtn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 17 4 12 9 7"/><path d="M20 18v-2a4 4 0 0 0-4-4H4"/></svg>';
          replyBtn.addEventListener('click', function (e) {
            e.stopPropagation();
            triggerReplyFor(m);
          });

          var wrapper = document.createElement('div');
          wrapper.className = 'row-wrap';
          // row goes first (order:1 by default), replyBtn gets order:2 via CSS
          wrapper.appendChild(row);
          wrapper.appendChild(replyBtn);
          return wrapper;
        }

        return row;
      }

      /* ── Trigger reply for a message ─────────────────────────────────────── */
      function triggerReplyFor(m) {
        var senderLabel = m.senderName || (m.senderType === 'customer' ? 'You' : 'Support');
        var preview = '';
        if (m.status === 'deleted') {
          preview = 'This message was deleted';
        } else if (m.messageType === 'image') {
          preview = '📷 Photo';
        } else if (m.messageType === 'video') {
          preview = '🎥 Video';
        } else if (m.messageType === 'voice') {
          preview = '🎤 Voice message';
        } else if (m.messageType === 'pdf') {
          preview = '📄 ' + (m.fileName || 'PDF');
        } else if (m.messageType === 'excel') {
          preview = '📊 ' + (m.fileName || 'Spreadsheet');
        } else if (m.messageType === 'file') {
          preview = '📎 ' + (m.fileName || 'File');
        } else {
          preview = m.content || '';
        }
        setReply(preview, senderLabel);
      }

      /* ── Video bubble ─────────────────────────────────────────────────────  */
      function mkVideoBub(m, quotedHtml) {
        var url = esc(m.fileUrl || '');
        var name = esc(m.fileName || 'Video');
        var sz = fmtBytes(m.fileSizeBytes);

        return '<div class="bub" style="padding:0;overflow:hidden;cursor:pointer;" data-url-video="' + url + '" data-name="' + name + '">'
          + (quotedHtml ? '<div style="padding:8px 10px 0;">' + quotedHtml + '</div>' : '')
          + '<div style="position:relative;">'
          + '<video class="bub-video-preview" src="' + url + '#t=0.1" muted playsinline preload="metadata" '
          + 'style="width:100%;max-height:200px;object-fit:cover;display:block;"></video>'
          + '<div style="position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;">'
          + '<div style="width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;box-shadow:0 3px 14px rgba(0,0,0,.35);">'
          + '<svg width="20" height="20" viewBox="0 0 24 24" fill="' + PRI + '"><path d="M8 5v14l11-7z"/></svg>'
          + '</div></div>'
          + '</div>'
          + '<div style="padding:5px 10px 4px;display:flex;align-items:center;gap:6px;border-top:1px solid rgba(0,0,0,.07);">'
          + '<span style="font-size:12px;">🎥</span>'
          + '<span style="flex:1;font-size:11.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + name + '</span>'
          + '<span style="font-size:10.5px;opacity:.6;">' + sz + '</span>'
          + '</div>'
          + (m.content
            ? '<div style="padding:4px 10px 8px;font-size:13px;line-height:1.45;">' + linkify(esc(m.content)) + '</div>'
            : '')
          + '</div>';
      }

      /* ── Voice bubble ─────────────────────────────────────────────────────  */
      var VID = 0;
      function mkVoiceBub(m) {
        var url = m.fileUrl || '';
        var id = 'v' + (++VID);
        var bars = '';
        var hs = [5, 10, 14, 7, 12, 16, 9, 5, 13, 8, 15, 11, 6, 14, 10, 12, 5, 9, 13, 6];
        for (var i = 0; i < 20; i++) {
          bars += '<div class="v-bar" style="height:' + hs[i] + 'px" data-idx="' + i + '"></div>';
        }
        return '<div class="bub-voice" id="bv_' + id + '">'
          + '<button class="v-btn" data-vid="' + id + '" data-url="' + esc(url) + '" aria-label="Play">'
          + '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>'
          + '</button>'
          + '<div class="v-right">'
          + '<div class="v-wf" id="vwf_' + id + '">' + bars + '</div>'
          + '<input type="range" class="v-seek" id="vsk_' + id + '" min="0" max="1" step="0.001" value="0"/>'
          + '<div class="v-time" id="vtm_' + id + '">0:00</div>'
          + '</div>'
          + '</div>';
      }

      /* ── Voice audio engine ──────────────────────────────────────────────── */
      msgs.addEventListener('click', function (e) {
        var btn = e.target.closest('.v-btn');
        if (!btn) return;
        var vid = btn.dataset.vid;
        var url = btn.dataset.url;
        if (!vid || !url) return;

        if (!audios[vid]) audios[vid] = new Audio(url);
        var au = audios[vid];
        var sk = document.getElementById('vsk_' + vid);
        var tm = document.getElementById('vtm_' + vid);
        var wf = document.getElementById('vwf_' + vid);

        if (!au.paused) {
          au.pause();
          btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
          return;
        }

        Object.keys(audios).forEach(function (k) {
          if (k !== vid && !audios[k].paused) {
            audios[k].pause();
            var ob = document.querySelector('[data-vid="' + k + '"]');
            if (ob) ob.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
          }
        });

        au.play().catch(function () { });
        btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>';

        au.ontimeupdate = function () {
          var p = au.duration ? au.currentTime / au.duration : 0;
          if (sk) sk.value = p;
          if (tm) tm.textContent = fmtDur(au.currentTime) + ' / ' + fmtDur(au.duration || 0);
          if (wf) {
            var bars = wf.querySelectorAll('.v-bar');
            var cut = Math.floor(p * bars.length);
            bars.forEach(function (b, i) { i < cut ? b.classList.add('act') : b.classList.remove('act'); });
          }
        };
        au.onended = function () {
          btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
          if (sk) sk.value = 0;
          if (tm) tm.textContent = '0:00';
          if (wf) wf.querySelectorAll('.v-bar').forEach(function (b) { b.classList.remove('act'); });
        };
      });

      msgs.addEventListener('input', function (e) {
        if (!e.target.classList.contains('v-seek')) return;
        var vid = e.target.id.replace('vsk_', '');
        var au = audios[vid];
        if (au && au.duration) au.currentTime = au.duration * parseFloat(e.target.value);
      });

      /* ── Helpers ─────────────────────────────────────────────────────────── */
      function sysMsg(t) {
        var r = document.createElement('div'); r.className = 'row sys';
        r.innerHTML = '<div class="bub">' + esc(t) + '</div>';
        msgs.insertBefore(r, typing); scrollBot();
      }
      function showTyping(on) { typing.classList.toggle('on', on); if (on) scrollBot(); }
      function scrollBot() { msgs.scrollTop = msgs.scrollHeight; }

      function connectWS() {
        if (!sess || !sess.conversationId) return;
        var proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        var wsUrl = proto + '//' + new URL(API).host + '/ws?merchantId=' + encodeURIComponent(MID);
        try {
          ws = new WebSocket(wsUrl);
          ws.onopen = function () {
            wsReady = true;
            pollInterval = 5000;
            ws.send(JSON.stringify({ type: 'subscribe', conversationId: sess.conversationId }));
            if (pollT) { clearTimeout(pollT); pollT = null; }
            fetchMsgs();
          };
          ws.onmessage = function (e) {
            try {
              var msg = JSON.parse(e.data);
              if (msg.type === 'new_message' || msg.type === 'conversation_update') {
                fetchMsgs();
              }
            } catch (_) { }
          };
          ws.onclose = function () {
            wsReady = false;
            ws = null;
            startBackoffPoll();
            setTimeout(connectWS, 5000);
          };
          ws.onerror = function () { ws && ws.close(); };
        } catch (e) {
          startBackoffPoll();
        }
      }

      function startBackoffPoll() {
        if (pollT || wsReady) return;
        pollInterval = Math.min(pollInterval * 1.5, 30000);
        pollT = setTimeout(function () {
          pollT = null;
          fetchMsgs().then(function () {
            startBackoffPoll();
          });
        }, pollInterval);
      }

      document.addEventListener('visibilitychange', function () {
        if (document.hidden) {
          isWidgetVisible = false;
          if (pollT) { clearTimeout(pollT); pollT = null; }
        } else {
          isWidgetVisible = true;
          if (!wsReady) { pollInterval = 5000; startBackoffPoll(); }
          else { lastHash = ''; fetchMsgs(); }
          markSeen();
        }
      });

      function esc(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;')
          .replace(/\n/g, '<br>');
      }
      function linkify(text) {
        if (!text) return '';
        var urlRegex = /(https?:\/\/[^\s)]+)/g;
        return text.replace(urlRegex, function (url) {
          return '<a href="' + url + '" target="_blank" rel="noopener" class="chat-link">'
            + url +
            '</a>';
        });
      }
      function fmtBytes(b) {
        if (!b) return '';
        if (b < 1024) return b + ' B';
        if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
        return (b / 1048576).toFixed(1) + ' MB';
      }
      function fmtDur(s) {
        if (!s || isNaN(s)) return '0:00';
        return Math.floor(s / 60) + ':' + (Math.floor(s % 60) < 10 ? '0' : '') + Math.floor(s % 60);
      }
      function mime2type(m) {
        if (!m) return 'file';
        if (m.startsWith('image/')) return 'image';
        if (m.startsWith('video/')) return 'video';
        if (m.startsWith('audio/')) return 'voice';
        if (m === 'application/pdf') return 'pdf';
        if (m.includes('spreadsheet') || m.includes('excel') || m === 'text/csv') return 'excel';
        return 'file';
      }
      function typeIco(t) {
        return { image: '🖼️', video: '🎥', pdf: '📄', excel: '📊', voice: '🎙️', file: '📎' }[t] || '📎';
      }

      /* ── Parent bridge ───────────────────────────────────────────────────── */
      document.getElementById('btn-close').addEventListener('click', function () {
        window.parent.postMessage({ type: 'CW_CLOSE' }, '*');
      });

      window.addEventListener('message', function (e) {
        if (e.data && e.data.type === 'CW_OPENED' && sess && sess.conversationId) {
          isWidgetVisible = true;
          lastHash = '';
          fetchMsgs();
          markSeen();
          if (!wsReady) {
            if (pollT) { clearTimeout(pollT); pollT = null; }
            pollInterval = 5000;
            startBackoffPoll();
          }
        }
        if (e.data && e.data.type === 'CW_CLOSED') {
          isWidgetVisible = false;
        }
      });

    })();
  </script>
</body>
